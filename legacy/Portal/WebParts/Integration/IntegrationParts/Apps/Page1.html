<!DOCTYPE html>
<html>
<head>
    <meta charset="utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta http-equiv="refresh" content="45;url=/Public/Login" />
    <title>Welcome to Music Ministry Portal</title>
    <script src="/Content/Assets/Scripts/jquery.min.js" type="text/javascript"></script>
    <script src="https://www.gstatic.com/swiffy/v4.7/runtime.js"></script>
    <style type="text/css">
        html, body {
            width: 100%;
            height: 100%;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>
<body style="margin: 0; overflow: hidden;">

    <a href="/Public/Login/">
        <div id="swiffycontainer" style="width: 640px; height: 480px; margin-left: auto; margin-right: auto;">
            <div style="margin-top: 100px; text-align: center">
                <img src="/Content/Assets/Images/loading.gif" />&nbsp;<strong>Loading...</strong><br />
                <span style="font-size: smaller">(click to skip Intro)</span>
            </div>
        </div>
    </a>

    <script>
        $(document).ready(function () {
            $.ajax({
                type: "POST",
                url: "/Content/Parts/Content/Service.svc/GetContentByTitle",
                data: JSON.stringify({
                    "title": "Intro Animation Data"
                }),
                contentType: "application/json; charset=utf-8",
                dataType: "json",
                success: function (data) {
                    if (data.d) {
                        $('#swiffycontainer').html('');
                        var stage = new swiffy.Stage(document.getElementById('swiffycontainer'), JSON.parse(data.d));
                        stage.start();
                    }
                    else {
                        //alert("null");
                    }
                },
                error: function (request, status, error) {
                    //alert(error);
                }
            });
        });
    </script>

</body>
</html>
