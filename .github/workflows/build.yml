name: Build and Test

on:
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore Portal/WebSystem/WebSystem/WCMS.WebSystem.WebApp.csproj

    - name: Build core libraries
      run: |
        dotnet build Portal/WebSystem/WCMS.Common/WCMS.Common.csproj --no-restore -c Release
        dotnet build Portal/WebSystem/WCMS.Framework/WCMS.Framework.csproj --no-restore -c Release
        dotnet build Portal/WebSystem/WCMS.Framework.Core.SqlProvider/WCMS.Framework.Core.SqlProvider.csproj --no-restore -c Release
        dotnet build Portal/WebSystem/WCMS.Framework.Core.XmlProvider/WCMS.Framework.Core.XmlProvider.csproj --no-restore -c Release

    - name: Build web application
      run: dotnet build Portal/WebSystem/WebSystem/WCMS.WebSystem.WebApp.csproj --no-restore -c Release

    - name: Build module libraries
      run: |
        dotnet build Portal/WebParts/SystemParts/WCMS.Framework.WebParts/WCMS.WebSystem.Apps.csproj --no-restore -c Release
        dotnet build Portal/WebParts/SystemPartsG2/WCMS.WebSystem.WebParts/WCMS.WebSystem.Apps.csproj --no-restore -c Release
        dotnet build Portal/WebParts/SystemPartsG3/WCMS.WebSystem.WebParts.Incident/WCMS.WebSystem.Apps.Incident.csproj --no-restore -c Release
        dotnet build Portal/WebParts/Integration/WCMS.WebSystem.Apps.Integration/WCMS.WebSystem.Apps.Integration.csproj --no-restore -c Release

    - name: Build web hosts
      run: |
        dotnet build Portal/WebParts/Integration/IntegrationParts/WCMS.WebSystem.Apps.Integration.WebApp.csproj --no-restore -c Release
        dotnet build Portal/WebParts/SystemParts/SystemParts/WCMS.WebSystem.Apps.SystemApps.WebApp.csproj --no-restore -c Release
        dotnet build Portal/WebParts/SystemPartsG2/SystemPartsG2/WCMS.WebSystem.Apps.SystemApps2.WebApp.csproj --no-restore -c Release
        dotnet build Portal/WebParts/SystemPartsG3/SystemPartsG3/WCMS.WebSystem.Apps.SystemApps3.WebApp.csproj --no-restore -c Release
        dotnet build Portal/WebParts/BranchLocator/WCMS.WebSystem.Apps.BranchLocator.WebApp/WCMS.WebSystem.Apps.BranchLocator.WebApp.csproj --no-restore -c Release
        dotnet build BibleReader/BibleReader/BibleReader.WebApp.csproj --no-restore -c Release
        dotnet build LessonReviewer/LessonReviewer/LessonReviewer.csproj --no-restore -c Release

    - name: Run tests with coverage
      run: |
        dotnet test Tests/WCMS.Framework.Tests/WCMS.Framework.Tests.csproj --no-restore -c Release --verbosity normal --collect:"XPlat Code Coverage"
        dotnet test Tests/WCMS.Integration.Tests/WCMS.Integration.Tests.csproj -c Release --verbosity normal --collect:"XPlat Code Coverage"
        dotnet test Portal/WebParts/SDKTest/SDKTest/SDKTest.csproj --no-restore -c Release --verbosity normal

  build-windows:
    runs-on: windows-latest
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]

    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore and build entire solution
      run: dotnet build mPortal.slnx -c Release

    - name: Run tests
      run: |
        dotnet test Tests/WCMS.Framework.Tests/WCMS.Framework.Tests.csproj --no-restore -c Release --verbosity normal
        dotnet test Portal/WebParts/SDKTest/SDKTest/SDKTest.csproj --no-restore -c Release --verbosity normal

    - name: Build SQL projects (DacFx)
      run: |
        dotnet build "Portal/WebSystem/WCMS.Framework.SqlDabase/WCMS.Framework.SqlDabase.sqlproj" -c Release || echo "SQL project build skipped (SSDT not installed)"
        dotnet build "Portal/WebParts/Integration/BibleReader.Database/BibleReader.Database.sqlproj" -c Release || echo "SQL project build skipped (SSDT not installed)"
        dotnet build "Portal/WebParts/Integration/WCMS.WebSystem.Apps.Integration.Database/WCMS.WebSystem.Apps.Integration.Database.sqlproj" -c Release || echo "SQL project build skipped (SSDT not installed)"

  integration-postgres:
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:17
        env:
          POSTGRES_PASSWORD: postgres
          POSTGRES_USER: postgres
          POSTGRES_DB: mportal_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    strategy:
      matrix:
        dotnet-version: [ '10.0.x' ]
    env:
      WCMS__DatabaseProvider: PostgreSql
      ConnectionStrings__DefaultConnection: Host=localhost;Port=5432;Database=mportal_test;Username=postgres;Password=postgres
      ConnectionStrings__ConnectionString: Host=localhost;Port=5432;Database=mportal_test;Username=postgres;Password=postgres
      DOTNET_ENVIRONMENT: Production
    steps:
    - uses: actions/checkout@v4

    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: ${{ matrix.dotnet-version }}

    - name: Restore dependencies
      run: dotnet restore Tests/WCMS.Integration.Tests/WCMS.Integration.Tests.csproj

    - name: Run PostgreSQL integration/model compatibility tests
      run: |
        dotnet test Tests/WCMS.Integration.Tests/WCMS.Integration.Tests.csproj --no-restore -c Release --verbosity normal --filter "TestCategory=PostgreSql"
