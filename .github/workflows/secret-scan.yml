name: Secret Scan

on:
  # push:
  #   branches: [ master ]
  # pull_request:
  #   branches: [ master ]

jobs:
  gitleaks:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4

    - name: Install gitleaks
      run: |
        set -euo pipefail
        VERSION="8.24.2"
        curl -sSL -o gitleaks.tar.gz "https://github.com/gitleaks/gitleaks/releases/download/v${VERSION}/gitleaks_${VERSION}_linux_x64.tar.gz"
        tar -xzf gitleaks.tar.gz gitleaks
        sudo mv gitleaks /usr/local/bin/gitleaks
        gitleaks version

    - name: Scan tracked files for secrets
      run: gitleaks detect --no-git --source . --redact --exit-code 1
